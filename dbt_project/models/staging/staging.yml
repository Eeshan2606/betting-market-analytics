version: 2

models:
  - name: stg_bookmaker_odds
    description: Flattened bookmaker odds with implied probabilities, one row per outcome per snapshot.
    columns:
      - name: snapshot_ts
        tests: [not_null]
      - name: bookmaker
        tests: [not_null]
      - name: decimal_odds
        tests: [not_null]
      - name: implied_probability
        tests: [not_null]

  - name: stg_polymarket_markets
    description: Parsed Polymarket binary markets, one row per market per snapshot. yes_price is the implied probability.
    columns:
      - name: snapshot_ts
        tests: [not_null]
      - name: question
        tests: [not_null]
      - name: yes_price
        tests: [not_null]